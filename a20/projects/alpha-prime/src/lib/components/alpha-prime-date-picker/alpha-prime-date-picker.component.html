@if (!readonly) {
  <p-inputgroup>
    <p-date-picker
      [style]="{'width':'100%' }"
      [inputStyle]="inputStyle"
      class="p-calendar"
      [placeholder]="ph()"
      [name]="name"
      appendTo="body"
      [showTime]="showTime"
      [showSeconds]="showSeconds"
      [firstDayOfWeek]="1"
      [(ngModel)]="date"
      [minDate]="minDate"
      [maxDate]="maxDate"
      [disabled]="disabled"
      (ngModelChange)="onDateChanged($event)"
      [dateFormat]="dateFormat"
      selectionMode="single"
      #cal>
    </p-date-picker>

    @if (date && showClear) {
      <p-inputgroup-addon>
        <p-button
          pRipple
          tabindex="-1"
          [disabled]="disabled"
          (click)="onClear()"
          severity="secondary"
          [ngClass]="sm ? 'p-button-sm' : ''"
          icon="fa fa-times">
        </p-button>
      </p-inputgroup-addon>
    }

    <p-inputgroup-addon>
      <p-button
        pRipple
        tabindex="-1"
        severity="info"
        [ngClass]="sm ? 'p-button-sm' : ''"
        [disabled]="disabled"
        (click)="cal.toggle()"
        icon="fa fa-calendar"
      ></p-button>
    </p-inputgroup-addon>

  </p-inputgroup>

} @else {
  <input
         pInputText
         [readonly]="true"
         [value]="readonlyCaption">
}
