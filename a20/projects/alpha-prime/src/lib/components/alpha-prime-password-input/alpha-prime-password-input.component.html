<p-input-group>
  <input [type]="inputType()"
         pInputText
         [name]="name()"
         maxlength="50"
         [disabled]="disabled()"
         [ngModel]="password()"
         (ngModelChange)="onPasswordChanged($event)">
  <p-button
      pRipple
      [attr.aria-label]="inputType() === 'password' ? 'Show password' : 'Hide password'"
      [attr.aria-pressed]="inputType() === 'text'"
      [icon]="inputType() === 'password' ? 'fa fa-eye' : 'fa fa-eye-slash'"
      [disabled]="empty()"
      (click)="onShowHide()"
  ></p-button>
</p-input-group>
