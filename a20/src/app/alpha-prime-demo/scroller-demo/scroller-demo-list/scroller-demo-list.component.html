<alpha-prime-debug-tag tag="scrollerDemoList"></alpha-prime-debug-tag>

@if(model()) {
  <div class="demo-header text-center mb-3">
    <h4 style="color: #212529;">Virtual Scroller Demo</h4>
    <div style="color: #6c757d;">
      <small>Total Items: {{model()!.nbRows}} | Visible: {{model()!.visibleFrom}} - {{model()!.visibleTo}} | Selected: {{selectedItem()?.title || 'None'}}</small>
    </div>
  </div>

  <div class="scroller-container">
    <alpha-prime-scroller [model]="model()">
      @for (row of model()!.vRows; track row.id) {
        <div #loopItem
             [ngStyle]="{
               'margin-bottom.px': row.measureHeight(loopItem, 5)
             }">
          <div class="p-2">
            <app-scroller-demo-card
              [item]="row.data"
              [selected]="row.data.id === selectedItem()?.id"
              (clicked)="onSelectRow($event)"
            ></app-scroller-demo-card>
          </div>
        </div>
      }
    </alpha-prime-scroller>

  </div>
}
